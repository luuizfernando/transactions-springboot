spring.application.name=transactions

# Postgre Connection
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/transactions}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgre}

# Security Secret
transactions.api.security.secret=${TRANSACTIONS_API_SECURITY_SECRET}

# Flyway Configuration
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
spring.flyway.repair-on-migrate=true
spring.flyway.validate-on-migrate=true
spring.jpa.hibernate.ddl-auto=validate

# Ollama Configuration
ai.client.type=ollama
ai.ollama.base-url=${AI_OLLAMA_BASE_URL:http://localhost:11434}
ai.ollama.model=${AI_OLLAMA_MODEL:qwen3.5:4b}
ai.ollama.timeout-seconds=${AI_OLLAMA_TIMEOUT_SECONDS:10}
ai.ollama.max-tokens=${AI_OLLAMA_MAX_TOKENS:10}
ai.ollama.summary-max-tokens=${AI_OLLAMA_SUMMARY_MAX_TOKENS:150}

# Redis Configuration
spring.data.redis.host=${SPRING_DATA_REDIS_HOST:localhost}
spring.data.redis.port=${SPRING_DATA_REDIS_PORT:6379}
spring.cache.type=redis
spring.cache.redis.time-to-live=1h
spring.cache.redis.cache-null-values=true